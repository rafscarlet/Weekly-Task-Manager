<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
     (click)="close()">

  <div
    class="w-full max-w-lg rounded-2xl border border-border bg-surface shadow-xl p-6"
    (click)="$event.stopPropagation()">

    <div class="flex items-start justify-between gap-4 mb-5">

      <div class="min-w-0">
        <h2 class="text-xl font-semibold text-text truncate">
          {{ task.title }}
        </h2>

        @if (task.tag) {
          <span
            class="inline-block mt-2 px-3 py-1 rounded-full text-xs font-bold text-on-primary"
            [style.background]="task.tag.color">
            {{ task.tag.name | uppercase }}
          </span>
        }
      </div>

      <button
        type="button"
        class="icon-button rounded-full p-2 hover:bg-surface-hover"
        (click)="close()"
        title="Close">

        <span class="material-symbols-rounded">
          close
        </span>
      </button>
    </div>


    <div class="space-y-4">

      <div>
        <p class="text-xs uppercase tracking-wider text-text-secondary">
          Description
        </p>

        <p class="mt-1 whitespace-pre-wrap text-sm text-text">
          {{ task.description || 'No description' }}
        </p>
      </div>


      @if (task.deadline) {
        <div>
          <p class="text-xs uppercase tracking-wider text-text-secondary">
            Deadline
          </p>

          <div class="mt-1 flex items-center gap-2 text-danger text-sm">

            <span class="material-symbols-rounded">
              warning
            </span>

            {{ task.deadline  }}

          </div>
        </div>
      }


      <div>
        <p class="text-xs uppercase tracking-wider text-text-secondary">
          Status
        </p>

        <p class="mt-1 text-sm text-text">
          {{ task.completed ? 'Completed' : 'Pending' }}
        </p>
      </div>

    </div>

  </div>
</div>
