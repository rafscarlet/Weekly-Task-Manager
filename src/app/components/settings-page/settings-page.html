<button class="p-3 absolute left-4 top-22 icon-button text-text" (click)="goBack()">
    <i class="material-symbols-rounded" style="font-size: 2rem">arrow_back</i>
</button>

<div class="flex flex-col items-center overflow-y-auto h-full w-full gap-4">
    <form class="flex flex-col gap-5 w-1/3 md:w-1/2" (submit)="saveSettings($event)">
        <!-- General -->
        <div class="section-header">General</div>

        <div class="section-field">
            <label for="showCompleted" class="text-text flex items-center gap-2">
                <i class="material-symbols-rounded">task</i> Show Completed Tasks
            </label>
            

            <input #showCompleted type="checkbox" name="showCompleted" [(ngModel)]="localSettings().showCompleted"
                class="round-checkbox" />
        </div>
        
        <div class="section-field">
            <label for="darkMode" class="text-text flex items-center gap-2">
                <i class="material-symbols-rounded">dark_mode</i> Dark Mode
            </label>
            

            <input #darkMode type="checkbox" name="darkMode" [ngModel]="localSettings().darkMode" (ngModelChange)="toggleDarkMode($event)"
                class="round-checkbox" />
        </div>

        <!-- Tags -->
        <div class="section-header">Tag Categories</div>

        @for (tag of localTags(); track $index){

        <div class="section-field justify-between">
            <div class="section-field">
                <label class="text-text"> {{$index + 1}}. </label>

                <input type="text" [name]="`category-name-${$index}`" [value]="tag.name"
                    (input)="updateName($event, tag.id)" placeholder="Name" class="input-text max-w-50" />

                <span class="text-sm text-text-secondary"> Color: </span>

                <input type="color" [value]="tag.color" (input)="updateColor($event, tag.id)"
                    class="w-10 h-10 min-w-7 hover:cursor-pointer border border-border rounded" />

                <span class="text-text-secondary text-sm"> {{tag.color}} </span>
            </div>

            <button type="button" class="remove-btn icon-button" (click)="deleteTag(tag.id)">
                <i class="material-symbols-rounded"> delete </i>
            </button>
        </div>

        }

        <button type="button"
            class="flex items-center gap-2 w-40 p-2 rounded border-2 border-transparent text-primary hover:bg-primary/10 hover:border-primary"
            (click)="addTag()">
            <i class="material-symbols-rounded"> add </i>

            Add Category
        </button>

        <!-- Export Options -->
        <div class="section-header">Copy to Clipboard</div>

        <div class="section-field">
            <label for="showDeadline" class="text-text flex items-center gap-2">
                <i class="material-symbols-rounded">hourglass</i>  Show Deadline on Export Copy
            </label>

            <input #showDeadline type="checkbox" name="showDeadline" [(ngModel)]="localSettings().showDeadlineOnCopy"
                class="round-checkbox" />
        </div>

        <button type="submit" class="submit-btn">Save Changes</button>
    </form>

    <p class="text-text-secondary italic">More options coming soon...🪼</p>
</div>
