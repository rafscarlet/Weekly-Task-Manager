name: Build App

on:
  workflow_dispatch:

jobs:
  build:

    strategy:
      matrix:
        os:
          - windows-latest
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build

      - name: Build Electron app
        run: npx electron-builder --publish never

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: release/